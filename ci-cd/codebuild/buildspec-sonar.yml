version: 0.2

env:
  variables:
    SONAR_SCANNER_VERSION: "5.0.1.3006"
    DOTNET_SONAR_TOOL_VERSION: "8.0.0"
  parameter-store:
    SONAR_TOKEN: "/renewable-energy/sonar-token"
    SONAR_HOST_URL: "/renewable-energy/sonar-host-url"
    SONAR_PROJECT_KEY: "/renewable-energy/sonar-project-key"
    SONAR_ORGANIZATION: "/renewable-energy/sonar-organization"

phases:
  install:
    runtime-versions:
      python: "3.11"
    commands:
      - echo "=== Installing SonarQube analysis tools ==="

      # Install .NET 9 SDK
      - wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb -O packages-microsoft-prod.deb
      - dpkg -i packages-microsoft-prod.deb
      - apt-get update -qq
      - apt-get install -y dotnet-sdk-9.0 2>/dev/null || true
      - |
        if ! command -v dotnet &>/dev/null; then
          curl -fsSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 9.0 --install-dir /usr/local/dotnet
          export PATH="$PATH:/usr/local/dotnet"
          echo "export PATH=\$PATH:/usr/local/dotnet" >> ~/.bashrc
        fi
      - dotnet --version

      # Install Java (required for sonar-scanner)
      - apt-get install -y default-jdk-headless 2>/dev/null || true
      - java -version

      # Install SonarScanner CLI for Python/general use
      - echo "Installing SonarScanner CLI..."
      - wget -q \
          "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip" \
          -O /tmp/sonar-scanner.zip
      - unzip -q /tmp/sonar-scanner.zip -d /opt
      - ln -sf "/opt/sonar-scanner-${SONAR_SCANNER_VERSION}-linux/bin/sonar-scanner" /usr/local/bin/sonar-scanner
      - sonar-scanner --version

      # Install dotnet-sonarscanner global tool for .NET projects
      - echo "Installing dotnet-sonarscanner..."
      - dotnet tool install --global dotnet-sonarscanner --version $DOTNET_SONAR_TOOL_VERSION || \
          dotnet tool update --global dotnet-sonarscanner --version $DOTNET_SONAR_TOOL_VERSION
      - export PATH="$PATH:$HOME/.dotnet/tools"
      - dotnet-sonarscanner --version

      # Install Python test + coverage tools
      - pip install --upgrade pip
      - pip install pytest pytest-cov coverage pylint

      # Install Python service dependencies
      - |
        for SERVICE in telemetry-service anomaly-detection-service alert-service simulator; do
          if [ -f "services/$SERVICE/requirements.txt" ]; then
            pip install -q -r "services/$SERVICE/requirements.txt"
          fi
        done

  pre_build:
    commands:
      - echo "=== Pre-build: setting up paths ==="
      - export PATH="$PATH:$HOME/.dotnet/tools"
      - IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-8)
      - export IMAGE_TAG
      - mkdir -p sonar-reports coverage-reports test-results

  build:
    commands:
      - echo "=== Build phase: Running SonarQube analysis ==="
      - export PATH="$PATH:$HOME/.dotnet/tools"

      # ─── .NET SonarQube analysis ─────────────────────────────────────────
      - echo "--- Starting .NET SonarQube scan ---"
      - |
        cd services/asset-service

        dotnet restore --verbosity quiet

        # Begin Sonar scan for .NET
        dotnet-sonarscanner begin \
          /k:"$SONAR_PROJECT_KEY" \
          /o:"$SONAR_ORGANIZATION" \
          /d:sonar.host.url="$SONAR_HOST_URL" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.cs.opencover.reportsPaths="../../coverage-reports/dotnet-coverage.xml" \
          /d:sonar.cs.vstest.reportsPaths="../../test-results/dotnet-test-results.trx" \
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**,**/*.Designer.cs" \
          /d:sonar.coverage.exclusions="**/*Tests*/**,**/*Test.cs,**/Program.cs" \
          /d:sonar.sourceEncoding="UTF-8"

        # Build with coverage collection
        dotnet build --no-restore --configuration Release

        # Run tests with coverage
        dotnet test \
          --no-build \
          --configuration Release \
          --logger "trx;LogFileName=../../test-results/dotnet-test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ../../test-results/dotnet \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

        # Copy coverage file to expected location
        COVERAGE_FILE=$(find ../../test-results/dotnet -name "coverage.opencover.xml" | head -1)
        if [ -n "$COVERAGE_FILE" ]; then
          cp "$COVERAGE_FILE" ../../coverage-reports/dotnet-coverage.xml
        fi

        # End Sonar scan for .NET
        dotnet-sonarscanner end \
          /d:sonar.token="$SONAR_TOKEN"

        echo ".NET SonarQube analysis complete."
        cd ../..

      # ─── Python SonarQube analysis ───────────────────────────────────────
      - echo "--- Running Python tests with coverage for SonarQube ---"
      - |
        PYTHON_COVERAGE_PATHS=""
        PYTHON_TEST_PATHS=""

        for SERVICE in telemetry-service anomaly-detection-service alert-service simulator; do
          cd "services/$SERVICE"

          if [ -d tests ]; then
            python3 -m pytest \
              tests/ \
              --tb=short \
              -q \
              --cov=. \
              --cov-report=xml:"../../coverage-reports/coverage-$SERVICE.xml" \
              --junitxml="../../test-results/pytest-$SERVICE.xml" \
              2>&1 || true

            PYTHON_COVERAGE_PATHS="$PYTHON_COVERAGE_PATHS,coverage-reports/coverage-$SERVICE.xml"
            PYTHON_TEST_PATHS="$PYTHON_TEST_PATHS,test-results/pytest-$SERVICE.xml"
          fi

          cd ../..
        done

        # Strip leading commas
        PYTHON_COVERAGE_PATHS="${PYTHON_COVERAGE_PATHS#,}"
        PYTHON_TEST_PATHS="${PYTHON_TEST_PATHS#,}"

        echo "Coverage paths: $PYTHON_COVERAGE_PATHS"
        echo "Test paths: $PYTHON_TEST_PATHS"

        # Write sonar-project.properties for Python services
        cat > sonar-project.properties << EOF
        sonar.projectKey=$SONAR_PROJECT_KEY
        sonar.organization=$SONAR_ORGANIZATION
        sonar.host.url=$SONAR_HOST_URL
        sonar.token=$SONAR_TOKEN
        sonar.sources=services/telemetry-service,services/anomaly-detection-service,services/alert-service,services/simulator
        sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/tests/**,**/*.pyc
        sonar.tests=services/telemetry-service/tests,services/anomaly-detection-service/tests,services/alert-service/tests,services/simulator/tests
        sonar.python.coverage.reportPaths=$PYTHON_COVERAGE_PATHS
        sonar.python.xunit.reportPath=$PYTHON_TEST_PATHS
        sonar.python.version=3
        sonar.sourceEncoding=UTF-8
        sonar.qualitygate.wait=true
        sonar.qualitygate.timeout=300
        EOF

        echo "Running sonar-scanner for Python services..."
        sonar-scanner \
          -Dproject.settings=sonar-project.properties \
          2>&1 | tee sonar-reports/python-scan.log

  post_build:
    commands:
      - echo "=== Post-build: Checking quality gate ==="

      # Wait for quality gate result and fail if gate fails
      - |
        echo "Waiting for SonarCloud quality gate result..."
        SONAR_DASHBOARD="${SONAR_HOST_URL}/dashboard?id=${SONAR_PROJECT_KEY}"
        echo "Dashboard: $SONAR_DASHBOARD"

        # Poll quality gate status (sonar-scanner with qualitygate.wait=true handles this,
        # but we also check the API directly for explicit failure handling)
        MAX_ATTEMPTS=30
        ATTEMPT=0
        QG_STATUS="PENDING"

        while [ $ATTEMPT -lt $MAX_ATTEMPTS ] && [ "$QG_STATUS" = "PENDING" ]; do
          sleep 10
          QG_RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY" \
            2>/dev/null || echo '{"projectStatus":{"status":"ERROR"}}')

          QG_STATUS=$(echo "$QG_RESPONSE" | python3 -c "
        import json, sys
        try:
            data = json.load(sys.stdin)
            print(data.get('projectStatus', {}).get('status', 'PENDING'))
        except:
            print('ERROR')
        " 2>/dev/null || echo "ERROR")

          ATTEMPT=$((ATTEMPT + 1))
          echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Quality gate status = $QG_STATUS"
        done

        echo "Final quality gate status: $QG_STATUS"

        if [ "$QG_STATUS" = "OK" ]; then
          echo "Quality gate PASSED."
        elif [ "$QG_STATUS" = "ERROR" ] || [ "$QG_STATUS" = "WARN" ]; then
          echo "Quality gate FAILED with status: $QG_STATUS"
          echo "Check $SONAR_DASHBOARD for details."
          exit 1
        else
          echo "WARNING: Quality gate status unknown or timed out: $QG_STATUS"
          echo "Proceeding with warning."
        fi

      - echo "SonarQube analysis complete."

artifacts:
  files:
    - sonar-reports/**/*
    - coverage-reports/**/*
    - test-results/**/*
    - sonar-project.properties
  name: SonarArtifacts
  discard-paths: no

cache:
  paths:
    - '/root/.nuget/packages/**/*'
    - '/root/.cache/pip/**/*'
    - '/opt/sonar-scanner-*/lib/**/*'
