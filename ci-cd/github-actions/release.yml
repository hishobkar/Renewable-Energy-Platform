name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  create-release:
    name: Build and push release images to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: asset-service
            image: renewable-energy/asset-service
          - service: telemetry-service
            image: renewable-energy/telemetry-service
          - service: anomaly-detection-service
            image: renewable-energy/anomaly-detection-service
          - service: alert-service
            image: renewable-energy/alert-service
          - service: simulator
            image: renewable-energy/simulator
          - service: dashboard
            image: renewable-energy/dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ matrix.image }}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || \
          aws ecr create-repository \
            --repository-name "${{ matrix.image }}" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256 \
            --region "${{ env.AWS_REGION }}"

      - name: Build and push versioned image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Scan release image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  deploy-prod:
    name: Deploy to Production (Blue/Green)
    runs-on: ubuntu-latest
    needs: create-release
    environment:
      name: prod
      url: http://renewable-energy.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate AppSpec for CodeDeploy
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          cat > appspec.json << EOF
          {
            "version": 1,
            "Resources": [
              {
                "TargetService": {
                  "Type": "AWS::ECS::Service",
                  "Properties": {
                    "TaskDefinition": "<TASK_DEFINITION>",
                    "LoadBalancerInfo": {
                      "ContainerName": "asset-service",
                      "ContainerPort": 5001
                    },
                    "PlatformVersion": "LATEST",
                    "NetworkConfiguration": {
                      "AwsvpcConfiguration": {
                        "Subnets": ["<SUBNET_1>", "<SUBNET_2>"],
                        "SecurityGroups": ["<SECURITY_GROUP>"],
                        "AssignPublicIp": "DISABLED"
                      }
                    },
                    "CapacityProviderStrategy": [
                      {
                        "Base": 0,
                        "CapacityProvider": "FARGATE",
                        "Weight": 1
                      }
                    ]
                  }
                }
              }
            ],
            "Hooks": [
              {
                "BeforeAllowTraffic": "arn:aws:lambda:${{ env.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:function:renewable-energy-pre-traffic-hook"
              },
              {
                "AfterAllowTraffic": "arn:aws:lambda:${{ env.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:function:renewable-energy-post-traffic-hook"
              }
            ]
          }
          EOF

      - name: Update ECS task definitions with new image
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"

          for SERVICE in asset-service telemetry-service anomaly-detection-service alert-service simulator dashboard; do
            IMAGE_NAME="renewable-energy/$SERVICE"
            IMAGE_URI="${{ env.ECR_REGISTRY }}/$IMAGE_NAME:$VERSION"

            echo "Updating task definition for $SERVICE with image: $IMAGE_URI"

            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "$SERVICE-prod" \
              --region "${{ env.AWS_REGION }}" \
              --query 'taskDefinition' \
              --output json)

            NEW_TASK_DEF=$(echo "$TASK_DEF" | \
              python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for c in td.get('containerDefinitions', []):
              if c.get('name') == '$SERVICE':
                  c['image'] = '$IMAGE_URI'
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','placementConstraints','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

            NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
              --region "${{ env.AWS_REGION }}" \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            echo "$SERVICE new task definition: $NEW_TASK_DEF_ARN"
          done

      - name: Deploy via CodeDeploy Blue/Green
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "renewable-energy-prod" \
            --deployment-group-name "renewable-energy-prod-dg" \
            --revision "revisionType=AppSpecContent,appSpecContent={content='$(cat appspec.json | tr -d '\n')'}" \
            --deployment-config-name "CodeDeployDefault.ECSAllAtOnce" \
            --description "Release ${{ needs.create-release.outputs.version }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'deploymentId' \
            --output text)

          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_ENV"

      - name: Monitor deployment progress
        run: |
          DEPLOYMENT_ID="${{ env.deployment_id }}"
          MAX_WAIT=1800   # 30 minutes
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws deploy get-deployment \
              --deployment-id "$DEPLOYMENT_ID" \
              --region "${{ env.AWS_REGION }}" \
              --query 'deploymentInfo.status' \
              --output text)

            echo "[$ELAPSED s] Deployment $DEPLOYMENT_ID status: $STATUS"

            case "$STATUS" in
              Succeeded)
                echo "Deployment succeeded!"
                exit 0
                ;;
              Failed|Stopped)
                echo "Deployment failed with status: $STATUS"
                exit 1
                ;;
            esac

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Deployment timed out after ${MAX_WAIT}s"
          exit 1

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - create-release
      - deploy-prod
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "prev_tag=${PREV_TAG:-}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG:-none}"

      - name: Generate changelog from commits
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.prev-tag.outputs.prev_tag }}"

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "Generating changelog for range: $RANGE"

          {
            echo "## What's Changed in $VERSION"
            echo ""
            echo "### Features"
            git log $RANGE --oneline --no-merges --grep="^feat" | sed 's/^/- /' || true
            echo ""
            echo "### Bug Fixes"
            git log $RANGE --oneline --no-merges --grep="^fix" | sed 's/^/- /' || true
            echo ""
            echo "### Performance Improvements"
            git log $RANGE --oneline --no-merges --grep="^perf" | sed 's/^/- /' || true
            echo ""
            echo "### Other Changes"
            git log $RANGE --oneline --no-merges \
              --invert-grep \
              --grep="^feat" \
              --grep="^fix" \
              --grep="^perf" \
              --grep="^chore" \
              --grep="^docs" \
              | sed 's/^/- /' || true
            echo ""
            echo "### Docker Images"
            echo ""
            echo "All images are tagged with \`$VERSION\` and \`latest\`:"
            echo ""
            echo "| Service | ECR Image |"
            echo "|---------|-----------|"
            echo "| asset-service | \`renewable-energy/asset-service:$VERSION\` |"
            echo "| telemetry-service | \`renewable-energy/telemetry-service:$VERSION\` |"
            echo "| anomaly-detection-service | \`renewable-energy/anomaly-detection-service:$VERSION\` |"
            echo "| alert-service | \`renewable-energy/alert-service:$VERSION\` |"
            echo "| simulator | \`renewable-energy/simulator:$VERSION\` |"
            echo "| dashboard | \`renewable-energy/dashboard:$VERSION\` |"
          } > changelog.md

          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Renewable Energy Platform ${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-alpha') }}
          files: |
            docker-compose.yml
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post release notification to Slack
        uses: slackapi/slack-github-action@v1.26.0
        if: success()
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "#36a64f",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "New Release: Renewable Energy Platform ${{ steps.version.outputs.version }}"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "Successfully deployed ${{ steps.version.outputs.version }} to production.\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}|View Release Notes>"
                      }
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
