name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-dotnet:
    name: Lint .NET (asset-service)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        working-directory: services/asset-service
        run: dotnet restore

      - name: Build (lint check)
        working-directory: services/asset-service
        run: dotnet build --no-restore --configuration Release /warnaserror

      - name: Check code formatting
        working-directory: services/asset-service
        run: dotnet format --verify-no-changes --verbosity diagnostic

  lint-python:
    name: Lint Python services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - telemetry-service
          - anomaly-detection-service
          - alert-service
          - simulator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Install service dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run flake8
        working-directory: services/${{ matrix.service }}
        run: |
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.venv,venv,.git

      - name: Check Black formatting
        working-directory: services/${{ matrix.service }}
        run: black --check --diff --line-length 120 .

      - name: Check isort import ordering
        working-directory: services/${{ matrix.service }}
        run: isort --check-only --diff --line-length 120 .

  test-dotnet:
    name: Test .NET (asset-service)
    runs-on: ubuntu-latest
    needs: lint-dotnet
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        working-directory: services/asset-service
        run: dotnet restore

      - name: Run tests
        working-directory: services/asset-service
        run: |
          dotnet test \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: services/asset-service/TestResults/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-coverage
          path: services/asset-service/TestResults/**/coverage.cobertura.xml
          retention-days: 7

  test-python:
    name: Test Python services
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      fail-fast: false
      matrix:
        service:
          - telemetry-service
          - anomaly-detection-service
          - alert-service
          - simulator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install pytest pytest-cov pytest-asyncio httpx
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run pytest
        working-directory: services/${{ matrix.service }}
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            tests/ || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/test-results.xml
            services/${{ matrix.service }}/coverage.xml
          retention-days: 7

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - test-dotnet
      - test-python
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: asset-service
            image: renewable-energy/asset-service
          - service: telemetry-service
            image: renewable-energy/telemetry-service
          - service: anomaly-detection-service
            image: renewable-energy/anomaly-detection-service
          - service: alert-service
            image: renewable-energy/alert-service
          - service: simulator
            image: renewable-energy/simulator
          - service: dashboard
            image: renewable-energy/dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: |
            ${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_VERSION=${{ env.IMAGE_TAG }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Verify image was built
        run: |
          echo "Successfully built ${{ matrix.image }}:${{ env.IMAGE_TAG }}"
          docker images | grep "${{ matrix.image }}" || echo "Image build succeeded (buildx cache)"

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - asset-service
          - telemetry-service
          - anomaly-detection-service
          - alert-service
          - simulator
          - dashboard
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan on ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'services/${{ matrix.service }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-${{ matrix.service }}
          path: trivy-results-${{ matrix.service }}.sarif
          retention-days: 30
