server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    # Forward /api/* to relevant services (optional – direct JS calls bypass this)
    location /api/assets/ {
        proxy_pass http://asset-service:8080/;
    }
    location /api/telemetry/ {
        proxy_pass http://telemetry-service:8000/;
    }
    location /api/anomalies/ {
        proxy_pass http://anomaly-detection-service:8000/;
    }
    location /api/alerts/ {
        proxy_pass http://alert-service:8000/;
    }
}
